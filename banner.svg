<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="30%" stop-color="#1a1040"/>
      <stop offset="70%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="640" cy="200" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)" opacity="0.5"/>

  <!-- Logo -->
  <rect x="565" y="80" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="597" y="122" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="white">CS</text>

  <!-- Plugin name -->
  <text x="640" y="200" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800" fill="white" letter-spacing="-1">eslint-plugin-code-style</text>

  <!-- Tagline -->
  <text x="640" y="250" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8">Consistent code formatting for React, TypeScript &amp; Tailwind CSS</text>

  <!-- Big number -->
  <text x="640" y="330" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#accent)">81</text>
  <text x="640" y="360" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#94a3b8" letter-spacing="3">CUSTOM ESLINT RULES</text>

  <!-- Stat badges row -->
  <!-- Auto-fixable -->
  <rect x="148" y="400" width="170" height="44" rx="10" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="192" y="428" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#a78bfa">71</text>
  <text x="218" y="428" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Auto-fixable</text>

  <!-- Configurable -->
  <rect x="348" y="400" width="170" height="44" rx="10" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="392" y="428" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#a78bfa">20</text>
  <text x="418" y="428" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8">Configurable</text>

  <!-- Zero Deps -->
  <rect x="548" y="400" width="184" height="44" rx="10" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">Zero Dependencies</text>

  <!-- ESLint v9 & v10 -->
  <rect x="762" y="400" width="170" height="44" rx="10" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="847" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">ESLint v9 &amp; v10</text>

  <!-- Next.js -->
  <rect x="962" y="400" width="170" height="44" rx="10" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1047" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">Next.js Ready</text>

  <!-- Three column highlights -->
  <!-- Column 1: React & JSX -->
  <text x="260" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">React &amp; JSX</text>
  <text x="260" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">14 JSX rules, component props,</text>
  <text x="260" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">hooks, and code ordering</text>

  <!-- Column 2: TypeScript -->
  <text x="640" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">TypeScript</text>
  <text x="640" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">9 TS-only rules for enums,</text>
  <text x="640" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">interfaces, types, and props</text>

  <!-- Column 3: Tailwind CSS -->
  <text x="1020" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">Tailwind CSS</text>
  <text x="1020" y="528" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">className ordering, multiline,</text>
  <text x="1020" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">dynamic-at-end, no extra spaces</text>

  <!-- Install command -->
  <rect x="370" y="580" width="540" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="395" y="604" font-family="'Courier New', monospace" font-size="13" fill="#64748b">$</text>
  <text x="415" y="604" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0">npm install eslint-plugin-code-style --save-dev</text>

  <!-- Bottom accent line -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accent)" opacity="0.5"/>
</svg>
